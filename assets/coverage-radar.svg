<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="720" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" fill="#c9d1d9" font-family="Segoe UI,PingFang SC,sans-serif" font-size="20" font-weight="700" text-anchor="middle">Mastermind 漏洞覆盖雷达</text>
  <text x="360" y="58" fill="#8b949e" font-family="Segoe UI,PingFang SC,sans-serif" font-size="12" text-anchor="middle">10 大现代漏洞类别 × 检测 / 利用 / 绕过 / 报告 四维能力</text>

  <!-- Radar center -->
  <g transform="translate(360, 290)">
    <!-- Grid circles -->
    <circle r="40" fill="none" stroke="#30363d" stroke-width="1"/>
    <circle r="80" fill="none" stroke="#30363d" stroke-width="1"/>
    <circle r="120" fill="none" stroke="#30363d" stroke-width="1"/>
    <circle r="160" fill="none" stroke="#30363d" stroke-width="1"/>
    <circle r="200" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Axes -->
    <g stroke="#30363d" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-200"/>
      <line x1="0" y1="0" x2="190" y2="-62"/>
      <line x1="0" y1="0" x2="118" y2="162"/>
      <line x1="0" y1="0" x2="-118" y2="162"/>
      <line x1="0" y1="0" x2="-190" y2="-62"/>
    </g>

    <!-- Data polygon (average scores) -->
    <polygon points="0,-180 171,-56 106,145 -106,145 -171,-56" fill="rgba(45,164,78,0.15)" stroke="#2da44e" stroke-width="2.5" filter="url(#glow)"/>
    <polygon points="0,-120 114,-37 71,97 -71,97 -114,-37" fill="rgba(47,129,247,0.12)" stroke="#2f81f7" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Data points outer -->
    <circle cx="0" cy="-180" r="5" fill="#2da44e"/>
    <circle cx="171" cy="-56" r="5" fill="#2da44e"/>
    <circle cx="106" cy="145" r="5" fill="#2da44e"/>
    <circle cx="-106" cy="145" r="5" fill="#2da44e"/>
    <circle cx="-171" cy="-56" r="5" fill="#2da44e"/>

    <!-- Labels -->
    <g font-family="Segoe UI,PingFang SC,sans-serif" font-size="13" font-weight="600">
      <text x="0" y="-218" fill="#58a6ff" text-anchor="middle">Web 前端漏洞</text>
      <text x="0" y="-232" fill="#8b949e" text-anchor="middle" font-size="10">XSS | CSRF | DOM</text>

      <text x="226" y="-68" fill="#58a6ff" text-anchor="start">注入类</text>
      <text x="226" y="-54" fill="#8b949e" text-anchor="start" font-size="10">SQLi | NoSQL | Command</text>

      <text x="140" y="182" fill="#58a6ff" text-anchor="start">服务端漏洞</text>
      <text x="140" y="196" fill="#8b949e" text-anchor="start" font-size="10">SSRF | XXE | LFI | RCE</text>

      <text x="-140" y="182" fill="#58a6ff" text-anchor="end">逻辑与认证</text>
      <text x="-140" y="196" fill="#8b949e" text-anchor="end" font-size="10">IDOR | AuthZ | OAuth | JWT</text>

      <text x="-226" y="-68" fill="#58a6ff" text-anchor="end">基础设施</text>
      <text x="-226" y="-54" fill="#8b949e" text-anchor="end" font-size="10">Cloud | K8s | S3 | Container</text>
    </g>

    <!-- Legend -->
    <g transform="translate(-240, 80)">
      <rect x="0" y="0" width="12" height="12" fill="rgba(45,164,78,0.3)" stroke="#2da44e" stroke-width="1.5"/>
      <text x="20" y="11" fill="#c9d1d9" font-family="Segoe UI,PingFang SC,sans-serif" font-size="11">综合覆盖度 (检测+利用+绕过+报告)</text>
      <rect x="0" y="22" width="12" height="12" fill="rgba(47,129,247,0.2)" stroke="#2f81f7" stroke-width="1.5" stroke-dasharray="4,3"/>
      <text x="20" y="33" fill="#c9d1d9" font-family="Segoe UI,PingFang SC,sans-serif" font-size="11">自动化检测能力</text>
    </g>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(0, 460)">
    <rect x="0" y="0" width="720" height="60" fill="#0d1117" opacity="0.6"/>
    <g text-anchor="middle" font-family="Segoe UI,PingFang SC,sans-serif">
      <text x="120" y="22" fill="#8b949e" font-size="11">覆盖漏洞类别</text>
      <text x="120" y="44" fill="#2da44e" font-size="18" font-weight="700">10 / 10</text>

      <text x="300" y="22" fill="#8b949e" font-size="11">绕过技术收录</text>
      <text x="300" y="44" fill="#2da44e" font-size="18" font-weight="700">60+</text>

      <text x="480" y="22" fill="#8b949e" font-size="11">报告模板</text>
      <text x="480" y="44" fill="#2da44e" font-size="18" font-weight="700">4 套</text>

      <text x="600" y="22" fill="#8b949e" font-size="11">WAF 指纹</text>
      <text x="600" y="44" fill="#2da44e" font-size="18" font-weight="700">13 种</text>
    </g>
  </g>
</svg>
